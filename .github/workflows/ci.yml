name: CI - backend

on:
  pull_request:
    branches: ["master"]
  push:
    branches: ["master"]
jobs:
  backend-ci:
    name: Run Backend CI Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven
      - name: Build with Maven
        run: mvn clean install
      - name: Run tests
        run: mvn test



